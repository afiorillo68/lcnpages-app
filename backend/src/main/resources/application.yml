spring:
  application:
    name: lcnpages
  profiles:
    active: local
  mongodb:
    auto-index-creation: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.security: DEBUG
    lab.localcloudnative.lcnpages: DEBUG
